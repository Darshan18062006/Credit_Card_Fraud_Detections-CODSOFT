<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Credit Card Fraud Detection</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Credit Card Fraud Detection</h1>

        <form id="predictForm">
            <div class="row">
                <label>Amount (amt):</label>
                <input type="number" name="amt" step="0.01" required>
            </div>

            <div class="row">
                <label>ZIP Code (zip):</label>
                <input type="number" name="zip" required>
            </div>

            <div class="row">
                <label>Cardholder Latitude (lat):</label>
                <input type="number" name="lat" step="0.0001" required>
            </div>

            <div class="row">
                <label>Cardholder Longitude (long):</label>
                <input type="number" name="long" step="0.0001" required>
            </div>

            <div class="row">
                <label>City Population (city_pop):</label>
                <input type="number" name="city_pop" required>
            </div>

            <div class="row">
                <label>UNIX Time (unix_time):</label>
                <input type="number" name="unix_time" required>
            </div>

            <div class="row">
                <label>Merchant Latitude (merch_lat):</label>
                <input type="number" name="merch_lat" step="0.0001" required>
            </div>

            <div class="row">
                <label>Merchant Longitude (merch_long):</label>
                <input type="number" name="merch_long" step="0.0001" required>
            </div>

            <button type="submit">Check for Fraud</button>
        </form>

        <div id="result"></div>
    </div>

    <script>
        const form = document.getElementById("predictForm");
        const resultDiv = document.getElementById("result");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            resultDiv.innerHTML = "Loading...";

            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());

            const resp = await fetch("/predict", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data),
            });

            const json = await resp.json();

            if (resp.ok) {
                const color = json.is_fraud ? "red" : "green";
                resultDiv.innerHTML = `
                    <div class="result-box" style="background-color: ${color}11; border: 1px solid ${color};">
                        <b>Prediction:</b> ${json.is_fraud ? "FRAUDULENT" : "LEGITIMATE"}<br>
                        <b>Probability of fraud:</b> ${(json.probability.fraud * 100).toFixed(2)}%
                    </div>
                `;
            } else {
                resultDiv.innerHTML = `
                    <div class="error">Error: ${json.error}</div>
                `;
            }
        });
    </script>
</body>
</html>
